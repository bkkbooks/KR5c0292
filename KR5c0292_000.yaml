front:
  text: 九轉青金靈砂丹
  hash: sha256:b2763cb089f97ac58c3fdc27861c2ef4dc8e461ce23d33368039075d2205e791
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0292_HFL_000-001a, image: hfl/0587/0587-042.png}
body:
  text: 水銀一斤硫黄四兩右用陽日以淨土磚十餘箇砌爐一座髙二尺上圎下方爐中一尺五寸下用鐵條七根隔炭火隔下留風門五寸爐口濶一尺爐中約盛炭五斤爲凖候乾用新鐵鍋一口先用水洗淨放於爐上烘乾以生姜蘸醋搽鍋内次用黄蠟少許搽潤再用紙揩過先下硫黃熔作汁傾入水銀用鉗住鍋持鏟不住手炒攪如有小火焰起用米醋洒之其火止再炒醋洒至一碗炒成青色爲度候冷取岀研細羅過名青金頭一轉伏火靈砂用鼎一付擦洗淨烘乾候冷將前青金頭末以匙輕輕傾入火鼎中不可满醋調赤石脂塗子口坐上水鼎按實用鐵線扎縛要緊外再用六乙塩泥通身一固以鐵摇條掛起用炭五斤成塊排砌在爐中以堅硬炭放於底下再用引火五兩將藥鼎懸於爐中炭上水鼎内先下滚湯八分用扇去風門口搧起火先文後武水鼎中湯不要滚出亦不可淺常要抽添如有固封處有透氣岀即以薄塩泥竹匙挑塗固之候爐寒爲度次日取出開鼎其靈砂於水鼎底懸起取出轉丹藥此砂可成寳外爐訣存之二轉重遊丹右將伏火靈砂入研細先用硫黄四兩入硫候溶次傾前砂末同炒成紅紫色交媾匀有些火起以醋洒之候冷取出研細羅過依前入鼎封固入爐依前炭五斤依前起火換水候一伏時寒爐取出開鼎其砂昇於水鼎下取岀轉丹藥火鼎中有些灰却是前轉硫黄以成真死硫灰收起能治痢疾冷病用米飯爲丸如桐子大每服三粒棗湯服之立効三轉紫霞丹右將重遊丹入研細用硫黄三兩入鍋熔成汁傾入丹未同炒成紫色炒匀候冷取岀研細羅過依前入鼎封固入爐依前用炭五斤依前起火水鼎中湯依前抽添一伏時寒爐取開鼎其砂仍前昇於水鼎下取岀轉丹藥灰依前收用四轉右將紫霞丹入研細用硫黄三兩入鍋熔成汁次入丹末同炒匀候冷取岀研細羅過依前入鼎封固入爐依前用炭五斤砌於爐中依前起火水鼎内換湯一伏時寒爐取出開鼎取出再轉丹藥其灰亦收之五轉右將四轉丹入研細用硫黄二兩入鍋候成傾入丹末同炒匀候冷取出再研細羅過依前入鼎封固入爐依前用炭五斤依前起大水鼎内依前換湯一伏時爲度寒爐取出開鼎將丹砂取出再轉丹藥六轉右將五轉丹入研細用硫黄二兩入鍋候成汁傾入丹末同炒匀候冷取出研細羅過依前入鼎封固入爐依前用炭五斤依前起火水鼎中換湯一伏時爲度寒爐取出開鼎將丹砂再入轉中燒煉七轉還返丹右將六轉丹入研細用硫黄一兩五錢入鍋候成汁傾入丹末炒成青色候冷取出研細羅過依前入鼎封固入爐依前用炭五斤依前起火水鼎中湯抽換到此其丹藥不飛起用槖籥催火其籥用紙做成似銀近家用的風袋一般去爐風門口用之藥鼎中作聲不要懼一伏時寒爐取出再轉八轉右將還返丹入研細用硫黄一兩五錢入鍋候熔作汁傾入丹末攪炒候冷取入研細羅過依前入鼎封固入爐依前用炭五斤依前起火水鼎内换湯其丹伏定不起用橐籥催火養之一伏時寒爐取出再入轉中轉丹藥九轉真陽丹右將八轉丹入研細用硫黃一兩入鍋候作汁傾入丹末炒成粉白色炒匀候冷取出研細羅過依前入鼎封固入爐依前用炭五斤依前起火水鼎中換湯一伏時寒爐開鼎其丹四起鼎中如銀碗相似鑿岀打碎入淨磁瓶內用油絹封瓶口線扎定再用黄蠟熔汁澆固彌宻用地穴三尺將丹藥瓶放在底用土埋之七伏時岀火毒候日足取出入乳鉢中乳細羅過用鳥驢乳汁丸如小梧桐子大候乾藏於爐中此丹巳曾全煉成了祭謝天地神明如服時用紅棗七箇泡湯早辰吞三粒無病少壯人不可服之鍊丹必擇淨基燒煉爲妙忌婦女并有暗疾之人雞猫犬亦不可見如違不靈也九轉青金靈砂丹
